<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>MapsBORA - Fila de Mapas</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .status-pending { color: orange; font-weight: bold; }
        .status-approved { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>MapsBORA - Map Submissions</h1>
    
    <table>
        <thead>
            <tr>
                <th>Mapper</th>
                <th>Map Name</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for sub in submissions %}
            <tr>
                <td>{{ sub.map_name }}</td>
                <td>{{ sub.location }}</td>
                <td>{{ sub.requested_date|date:"d/m/Y" }}</td>
                <td class="status-{{ sub.status }}">{{ sub.get_status_display }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">There isn't maps in queue.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Map: {{ submission.map_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; padding-top: 50px; }
        .edit-card { max-width: 550px; margin: auto; border-radius: 20px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .slot-machine-container {
            background: #fff;
            border: 2px solid #198754;
            border-radius: 12px;
            overflow: hidden;
        }
        .slot-picker {
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
            font-weight: bold;
            color: #198754;
            border: none !important;
            padding: 12px !important;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card edit-card p-4 p-md-5">
        <h2 class="mb-2 fw-bold text-dark">Edit Submission</h2>
        <p class="text-muted mb-4 small">Currently: <strong>{{ submission.map_name }}</strong></p>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="alert alert-warning border-0 shadow-sm mb-4">
                <label class="form-label fw-bold small text-uppercase">Authorization Required</label>
                <input type="text" name="token" class="form-control form-control-lg border-warning" placeholder="Enter your 10-character token" required>
            </div>

            <hr class="my-4">

            <div class="mb-3">
                <label class="form-label fw-bold small">Map Name</label>
                <input type="text" name="map_name" class="form-control" value="{{ submission.map_name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small">Description / Notes</label>
                <textarea name="description" class="form-control" rows="3">{{ submission.description }}</textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-success text-uppercase">Reschedule Ride (Tuesday Only)</label>
                <div class="slot-machine-container">
                    <select name="request_date" class="form-select slot-picker" required>
                        {% for date in next_tuesdays %}
                            <option value="{{ date|date:'Y-m-d' }}" {% if date|date:'Y-m-d' == submission.request_date|date:'Y-m-d' %}selected{% endif %}>
                                {{ date|date:"l, F d" }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success btn-lg fw-bold shadow-sm">SAVE CHANGES</button>
                <a href="{% url 'index' %}" class="btn btn-link text-muted">Go back to Queue</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
